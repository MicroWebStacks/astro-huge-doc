fetch:
  select: VectorMind/alm-ontology
  github:
    - repo: MicroWebStacks/astro-big-doc
      branch: main
      folders: [content]
      dest: content
    - repo: VectorMind/alm-ontology
      branch: main
      dest: content
    - repo: VectorMind/evidence-engine
      branch: main
      dest: content
    - repo: HomeSmartMesh/homesmartmesh.github.io
      branch: main
      dest: content
output:
  ssr: dist
  content: content
  store: dataset
  db_path: dataset/content.db
server:
  protocol: http
  host: 0.0.0.0
  port: 4321
kroki:
  server: https://kroki.io
diagram:
  default_renderer: kroki
  renderers:
    kroki:
      server: https://kroki.io
  languages:
    plantuml: kroki
    blockdiag: kroki
    mermaid: kroki
  aliases:
    puml: plantuml
    mmd: mermaid
collect:
  folder_single_doc: false
  file_link_ext: ["svg","webp","png","jpeg","jpg","xlsx","glb","puml","mermaid","mmd"]
  file_compress_ext: ['txt','md','json','csv','tsv','yaml','yml','mermaid','mmd']
  external_storage_kb: 512
  inline_compression_kb: 32
render:
  highlighter:
    theme: dark-plus
    langs: ['javascript','js','python','yaml', 'markdown', 'text']
html_cache:
  exclude_paths:
    - /assets/
    - .well-known/
