# Local Kroki rendering for PlantUML/BlockDiag in MicroWebStacks.
#
# Runs Kroki locally so the default MICROWEBSTACKS_KROKI_SERVER=http://localhost:18000
# works out of the box with zero secrets and no Java on the host / in VS Code.
# Mermaid renders client-side and does not use this compose stack.
#
#   docker compose up -d     # start Kroki on http://localhost:18000
#   docker compose down      # stop
#
# Corporate users skip this and point MICROWEBSTACKS_KROKI_SERVER at their internal
# Kroki endpoint instead. Public opt-in: set it to https://kroki.io.
services:
  kroki:
    image: yuzutech/kroki:latest
    ports:
      - "18000:8000"   # host 18000 -> container 8000; non-default host port avoids clashes
