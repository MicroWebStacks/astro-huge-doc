name: VS Code extension tests

on:
  pull_request:
    paths:
      - 'packages/vscode-extension/**'
      - 'src/**'
      - 'server/**'
      - 'test/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/vscode-extension-tests.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  extension-host:
    name: Extension host (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Run extension-host suite (Ubuntu)
        if: runner.os == 'Linux'
        run: xvfb-run -a pnpm test:extension
      - name: Run extension-host suite (Windows)
        if: runner.os == 'Windows'
        run: pnpm test:extension
      - name: Publish runtime summary
        if: always()
        run: node scripts/publish-extension-test-summary.js .tmp/extension-tests/reports
      - name: Upload extension-test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension-tests-${{ runner.os }}
          path: .tmp/extension-tests/reports
          if-no-files-found: error
