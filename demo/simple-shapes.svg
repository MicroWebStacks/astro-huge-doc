<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180" role="img" aria-label="Simple SVG shapes example">
  <rect x="0" y="0" width="320" height="180" rx="8" fill="#f4f6fb" stroke="#c7d0e0"/>
  <circle cx="70" cy="90" r="40" fill="#5b8def"/>
  <rect x="130" y="50" width="80" height="80" rx="10" fill="#f2a65a"/>
  <polygon points="270,50 300,130 240,130" fill="#6fbf73"/>
  <text x="160" y="165" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#4a5568">plain SVG — no renderer involved</text>
</svg>
