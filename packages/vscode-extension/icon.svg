<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#1e1b4b" flood-opacity="0.35"/>
    </filter>
    <clipPath id="page">
      <rect x="52" y="40" width="152" height="176" rx="18"/>
    </clipPath>
  </defs>

  <!-- background tile -->
  <rect x="0" y="0" width="256" height="256" rx="58" fill="url(#bg)"/>

  <!-- document / preview panel -->
  <g filter="url(#shadow)">
    <rect x="52" y="40" width="152" height="176" rx="18" fill="#FFFFFF"/>
  </g>

  <!-- file-tree sidebar -->
  <g clip-path="url(#page)">
    <rect x="52" y="40" width="46" height="176" fill="#EEF2FF"/>
    <!-- tree rows: square + short line, with indentation -->
    <g fill="#6366F1">
      <rect x="60" y="60" width="9" height="9" rx="2"/>
      <rect x="60" y="92" width="9" height="9" rx="2"/>
      <rect x="72" y="116" width="9" height="9" rx="2"/>
      <rect x="60" y="148" width="9" height="9" rx="2"/>
    </g>
    <g fill="#C7D2FE">
      <rect x="73" y="62" width="16" height="5" rx="2.5"/>
      <rect x="73" y="94" width="16" height="5" rx="2.5"/>
      <rect x="85" y="118" width="6" height="5" rx="2.5"/>
      <rect x="73" y="150" width="16" height="5" rx="2.5"/>
    </g>
  </g>

  <!-- main content: heading + text lines -->
  <rect x="112" y="62" width="74" height="13" rx="6.5" fill="url(#accent)"/>
  <g fill="#CBD5E1">
    <rect x="112" y="88" width="74" height="7" rx="3.5"/>
    <rect x="112" y="103" width="58" height="7" rx="3.5"/>
  </g>

  <!-- diagram glyph: three connected nodes -->
  <g stroke="#3B82F6" stroke-width="5" stroke-linecap="round">
    <line x1="130" y1="150" x2="118" y2="188"/>
    <line x1="130" y1="150" x2="172" y2="178"/>
  </g>
  <g fill="url(#accent)" stroke="#FFFFFF" stroke-width="3">
    <circle cx="130" cy="150" r="11"/>
    <circle cx="116" cy="190" r="11"/>
    <circle cx="174" cy="178" r="11"/>
  </g>
</svg>
