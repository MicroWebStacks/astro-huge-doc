<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- "Graph M" — the letter M (markdown) drawn as a node graph (diagrams).
       Vivid indigo→violet tile so it stands out on dark VS Code sidebars
       while still holding on the white marketplace page. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <g stroke="#FFFFFF" stroke-width="9" stroke-linecap="round">
    <line x1="33" y1="89" x2="33" y2="42"/>
    <line x1="33" y1="42" x2="64" y2="76"/>
    <line x1="64" y1="76" x2="95" y2="42"/>
    <line x1="95" y1="42" x2="95" y2="89"/>
  </g>
  <g fill="#FFFFFF">
    <circle cx="33" cy="89" r="10"/>
    <circle cx="33" cy="42" r="10"/>
    <circle cx="95" cy="42" r="10"/>
    <circle cx="95" cy="89" r="10"/>
  </g>
  <circle cx="64" cy="76" r="11" fill="#22D3EE"/>
</svg>
